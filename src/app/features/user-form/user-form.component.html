<section class="form-page">
  <div class="form-card">
    <div class="form-header">
      <p class="form-tag">Template-Driven Form Demo</p>
      <h1>User Registration Form</h1>
      <p class="form-description">
        This sample uses simple bindings so trainees can focus on learning
        `ngModel` first.
      </p>
    </div>

    <!--
      ngForm creates the template-driven form object.
      We pass it to onSubmit() when the form is submitted.
    -->
    <form (ngSubmit)="onSubmit(userForm)" #userForm="ngForm">
      <div ngModelGroup="userInfo" class="form-group">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input
            id="fullName"
            type="text"
            [(ngModel)]="fullName"
            name="fullName"
            placeholder="Enter your full name",
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            name="email"
            ngModel
            placeholder="Enter your email"
            required
            email
          />
          <span class="error-message" *ngIf="userForm.touched && userForm.controls['email']?.invalid">
            Please enter a valid email address.
          </span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            name="password"
            ngModel
            placeholder="Enter your password"
            required=""
          />
          <span class="error-message" *ngIf="userForm.controls['password']?.invalid">
            Password is required.
          </span>
        </div>
      </div>
      <div class="form-group">
        <span class="field-label">Gender</span>
        <div class="choice-group">
          @for (gender of genderOptions; track gender) {
            <label class="choice-item">
              <input
                type="radio"
                name="gender"
                ngModel
                [value]="gender"
              />
              <span>{{ gender }}</span>
            </label>
          }
        </div>
      </div>

      <div class="form-group">
        <label for="country">Country</label>
        <select
          id="country"
          name="country"
          ngModel
        >
          <option value="">Select a country</option>
          @for (country of countryOptions; track country) {
            <option [value]="country">{{ country }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea
          id="bio"
          name="bio"
          ngModel
          rows="4"
          placeholder="Write a short bio"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="choice-item">
            <input
              type="checkbox"
              name="rememberMe"
              ngModel
            />
            <span>Remember Me</span>
          </label>
      </div>

      <button type="submit" class="submit-button" [disabled]="userForm.invalid">Submit</button>
    </form>
  </div>
  <button class="submit-button" (click)="patchValue()">Patch Value</button>
  <button class="submit-button" (click)="setValue()">Set Value</button>
</section>
